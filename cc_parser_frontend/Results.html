<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis Results | W++ Token Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080b14;
      --s1: #0d1120;
      --s2: #111828;
      --card: #151d2e;
      --border: #1e2a42;
      --border2: #263450;
      --text: #cdd6f4;
      --muted: #6c7a96;
      --accent: #89b4fa;
      --green: #a6e3a1;
      --yellow: #f9e2af;
      --red: #f38ba8;
      --mauve: #cba6f7;
      --peach: #fab387;
      --sky: #89dceb;
      --teal: #94e2d5;

      /* token colors */
      --kw: #cba6f7;
      /* Keywords */
      --id: #89dceb;
      /* Identifiers */
      --con: #fab387;
      /* Constants (Numbers) */
      --lit: #f9e2af;
      /* Literals (Strings/Chars) */
      --op: #89b4fa;
      /* Operators */
      --pun: #a6e3a1;
      /* Punctuators */
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(137, 180, 250, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(137, 180, 250, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 11, 20, 0.9);
      backdrop-filter: blur(12px);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #89b4fa, #cba6f7);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text h1 {
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: all .2s;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border2);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-primary {
      background: var(--accent);
      color: #080b14;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(137, 180, 250, 0.3);
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 24px;
    }

    /* ═══════════ SECTION CARDS ═══════════ */
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .section-header {
      padding: 20px 24px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: .8rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .15em;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* Warning indicator for unrecognized tokens */
    .section-title.warning::before {
      background: var(--red);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .refresh-link {
      font-size: .7rem;
      color: var(--accent);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background .2s;
    }

    .refresh-link:hover {
      background: rgba(137, 180, 250, 0.1);
    }

    .section-body {
      padding: 24px;
      flex: 1;
    }

    /* ═══════════ TABLES ═══════════ */
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .8rem;
      font-family: 'JetBrains Mono', monospace;
    }

    th {
      background: rgba(255, 255, 255, 0.02);
      text-align: left;
      padding: 12px 16px;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .pill {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: .7rem;
      font-weight: 700;
    }

    .stat-val {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-lbl {
      font-size: .7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .summary-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .metric-card {
      background: rgba(255, 255, 255, 0.03);
      padding: 18px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .metric-big {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .metric-label {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-family: 'JetBrains Mono', monospace;
    }

    .metric-sub {
      margin-top: 8px;
      font-size: .8rem;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      opacity: 0.9;
    }

    .bar-table {
      width: 100%;
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 150px 70px 1fr 80px;
      align-items: center;
      gap: 12px;
    }

    .bar-track {
      height: 8px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .bar-perc {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      color: var(--muted);
    }

    .bar-total {
      font-family: 'JetBrains Mono', monospace;
      font-size: .9rem;
      color: #fff;
      text-align: center;
    }

    .bar-name {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bar-badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: .75rem;
      letter-spacing: .02em;
      font-family: 'JetBrains Mono', monospace;
    }

    .line-dist {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .line-row {
      display: grid;
      grid-template-columns: 90px 70px 1fr 50px;
      gap: 12px;
      align-items: center;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    @media (max-width: 900px) {
      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .bar-row {
        grid-template-columns: 1fr 70px 1fr 70px;
      }
    }

    @media (max-width: 560px) {
      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .bar-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .bar-total,
      .bar-perc {
        text-align: left;
      }

      .line-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }

    .stat-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }

    .stream-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .token-chip {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: .75rem;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Warning message for unrecognized tokens */
    .warning-message {
      background: rgba(243, 139, 168, 0.1);
      border: 1px solid rgba(243, 139, 168, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--red);
      font-family: 'JetBrains Mono', monospace;
    }

    /* AST Syntax Highlighting & Container */
    .json-key {
      color: var(--mauve);
      font-weight: 500;
    }

    .json-string {
      color: var(--green);
    }

    .json-number {
      color: var(--con);
    }

    .json-boolean {
      color: var(--peach);
    }

    .json-null {
      color: var(--red);
    }

    .ast-container {
      max-height: 500px;
      overflow-y: auto;
      background: #05080f;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      position: relative;
    }

    .ast-container pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .ast-container code {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    .ast-copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--border2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: all 0.2s;
      z-index: 10;
    }

    .ast-copy-btn:hover {
      background: var(--accent);
      color: #080b14;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-card {
      animation: fadeInUp 0.6s ease forwards;
      opacity: 0;
    }

    .section-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .section-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .section-card:nth-child(3) {
      animation-delay: 0.3s;
    }

    .section-card:nth-child(4) {
      animation-delay: 0.4s;
    }

    .section-card:nth-child(5) {
      animation-delay: 0.5s;
    }

    .section-card:nth-child(6) {
      animation-delay: 0.6s;
    }

    .section-card:nth-child(7) {
      animation-delay: 0.7s;
    }

    .section-card:nth-child(8) {
      animation-delay: 0.8s;
    }

    .section-card:nth-child(9) {
      animation-delay: 0.9s;
    }

    .section-card:nth-child(10) {
      animation-delay: 1.0s;
    }

    .section-card:nth-child(11) {
      animation-delay: 1.1s;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-area">
      <div class="logo-icon">⚙</div>
      <div class="logo-text">
        <h1>Analysis Report</h1>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="window.print()">Print PDF</button>
      <a href="Analyze.html" class="btn btn-primary">Change Input File</a>
    </div>
  </header>

  <div class="container">
    <div class="results-grid" id="resultsGrid">
      <!-- Results will be injected here -->
    </div>
  </div>

  <div class="loading-overlay" id="fullLoader">
    <div style="font-size: 2rem; margin-bottom: 1rem;">⚙</div>
    <p style="font-family: 'JetBrains Mono', monospace; letter-spacing: .2em;">GENERATING REPORT...</p>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:8000';

    document.addEventListener('DOMContentLoaded', () => {
      initReport();
    });

    async function initReport() {
      try {
        const code = localStorage.getItem('sourceCode');
        // If we have source code, always prefer fresh backend results (prevents stale cached "unrecognized" tokens)
        if (code && code.trim()) {
          await refreshSection({ silentRedirectIfMissingCode: false });
          return;
        }

        const resultData = localStorage.getItem('analysisResult');
        if (!resultData) {
          window.location.href = 'Analyze.html';
          return;
        }

        renderReport(JSON.parse(resultData));
      } catch (err) {
        console.error('Report Rendering Error:', err);
        alert('Failed to render report: ' + err.message);
      } finally {
        setTimeout(() => {
          document.getElementById('fullLoader').style.display = 'none';
        }, 800);
      }
    }

    async function refreshSection(opts = {}) {
      const code = localStorage.getItem('sourceCode');
      const filename = localStorage.getItem('sourceFilename') || 'input.wpp';
      if (!code || !code.trim()) {
        if (opts.silentRedirectIfMissingCode) window.location.href = 'Analyze.html';
        return;
      }

      document.getElementById('fullLoader').style.display = 'flex';

      try {
        const response = await fetch(`${API_BASE_URL}/analyze/code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, filename: filename })
        });
        if (!response.ok) {
          let msg = `Refresh failed (${response.status})`;
          try {
            const err = await response.json();
            if (err?.detail && typeof err.detail === 'string') msg = err.detail;
          } catch {
            // ignore parse errors
          }
          throw new Error(msg);
        }
        const data = await response.json();
        localStorage.setItem('analysisResult', JSON.stringify(data));
        renderReport(data);
      } catch (e) {
        alert('Refresh failed: ' + e.message);
      } finally {
        document.getElementById('fullLoader').style.display = 'none';
      }
    }

    function renderReport(data) {
      try {
        const grid = document.getElementById('resultsGrid');
        if (!grid) return;
        grid.innerHTML = '';

        // Normalize backend fields: some backends return separators instead of punctuators
        if (!data.punctuators && data.separators) {
          data.punctuators = data.separators;
        }
        // Normalize constants from literals (integers and floats) if constants is missing
        if (!data.constants && data.literals) {
          data.constants = {
            integers: data.literals.integers || { counts: {}, tokens: {} },
            floats: data.literals.floats || { counts: {}, tokens: {} }
          };
        }

        // 2. Snapshot (matches screenshot summary cards)
        grid.appendChild(createSection('Snapshot', createSnapshot(data), true));

        // 3. Category Distribution (matches screenshot bars)
        grid.appendChild(createSection('Category Distribution', createCategoryBars(data), true));

        // 4. Tokens per Line (matches screenshot line distribution)
        grid.appendChild(createSection('Tokens per Line', createLineDistribution(data), true));

        // 5. Token Categories (existing table)
        const categories = createCategoryTable(data);
        grid.appendChild(createSection('Category Breakdown', categories));

        // 6. Keywords
        if (data.keywords && data.keywords.counts && Object.keys(data.keywords.counts).length > 0) {
          grid.appendChild(createSection('Keywords Detected', createTable(data.keywords, 'Keyword', 'kw')));
        }

        // 7. Identifiers
        if (data.identifiers && data.identifiers.counts && Object.keys(data.identifiers.counts).length > 0) {
          grid.appendChild(createSection('Identifiers', createTable(data.identifiers, 'Identifier', 'id')));
        }

        // 8. Operators
        if (data.operators && data.operators.counts && Object.keys(data.operators.counts).length > 0) {
          grid.appendChild(createSection('Operators', createTable(data.operators, 'Operator', 'op')));
        }

        // 9. Separators / Punctuators
        if (data.punctuators && data.punctuators.counts && Object.keys(data.punctuators.counts).length > 0) {
          grid.appendChild(createSection('Separators', createTable(data.punctuators, 'Separator', 'pun')));
        }

        // 10. Constants
        if (data.constants) {
          const constData = {
            counts: { ...(data.constants?.integers?.counts || {}), ...(data.constants?.floats?.counts || {}) },
            tokens: { ...(data.constants?.integers?.tokens || {}), ...(data.constants?.floats?.tokens || {}) }
          };
          if (Object.keys(constData.counts).length > 0) {
            grid.appendChild(createSection('Constants (Numeric)', createTable(constData, 'Constant', 'con')));
          }
        }

        // 11. Literals
        if (data.literals) {
          const litData = {
            counts: { ...(data.literals?.strings?.counts || {}), ...(data.literals?.chars?.counts || {}) },
            tokens: { ...(data.literals?.strings?.tokens || {}), ...(data.literals?.chars?.tokens || {}) }
          };
          if (Object.keys(litData.counts).length > 0) {
            grid.appendChild(createSection('Literals (Textual)', createTable(litData, 'Literal', 'lit')));
          }
        }

        // 12. Unrecognized Tokens / Characters
        {
          const counts = data.unrecognized?.counts || {};
          const hasAny = Object.keys(counts).length > 0;

          const unrecognizedContent = hasAny
            ? `
        <div class="warning-message">
          ⚠ These tokens/characters do not match any known keywords, operators, separators, literals, constants, or valid identifier patterns in W++
        </div>
        ${createTable(data.unrecognized, 'Token', 'red')}
      `
            : `
        <div class="mono" style="color:var(--muted); background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:16px;">
          No unrecognized tokens were returned by the backend.
        </div>
      `;

          grid.appendChild(createSection('⚠ Unrecognized Tokens', unrecognizedContent, false, hasAny));
        }

        // 12b. Parser Data (Syntax Analysis, Symbol Table, and AST)
        if (data.parser) {
          const parserAst = data.parser.ast || {};
          const symbolTable = data.parser.symbol_table || [];

          // Append Syntax Errors & Warnings Card
          grid.appendChild(createSection('Parser: Syntax Analysis', createParserErrorsCard(parserAst), true));

          // Append Symbol Table Card
          grid.appendChild(createSection('Parser: Symbol Table', createSymbolTableCard(symbolTable), true));

          // Append AST Card
          grid.appendChild(createSection('Parser: Abstract Syntax Tree (AST)', createAstCard(parserAst), true));
        }

        // 13. Token Stream
        if (data.allTokens && data.allTokens.length > 0) {
          grid.appendChild(createSection('Token Stream', createTokenStream(data.allTokens), true));
        } else {
          const stream = generateFallbackStream(data);
          grid.appendChild(createSection('Token Stream', createTokenStream(stream), true));
        }
      } catch (e) {
        console.error('Error in renderReport:', e);
        throw e;
      }
    }

    function generateFallbackStream(data) {
      const stream = [];
      const add = (dict, cat, col) => {
        if (!dict || !dict.tokens) return;
        for (const [name, lines] of Object.entries(dict.tokens)) {
          lines.forEach(l => stream.push({ value: name, category: cat, line: l, color: col }));
        }
      };
      add(data.keywords, 'KEYWORD', 'kw');
      add(data.identifiers, 'IDENTIFIER', 'id');
      add(data.operators, 'OPERATOR', 'op');
      add(data.punctuators, 'PUNCTUATOR', 'pun');

      if (data.constants) {
        add(data.constants.integers, 'CONSTANT', 'con');
        add(data.constants.floats, 'CONSTANT', 'con');
      }
      if (data.literals) {
        add(data.literals.strings, 'LITERAL', 'lit');
        add(data.literals.chars, 'LITERAL', 'lit');
      }

      // Add unrecognized tokens to stream
      add(data.unrecognized, 'UNRECOGNIZED', 'red');

      return stream.sort((a, b) => a.line - b.line);
    }

    function createTokenStream(tokens) {
      let chips = tokens.map(t => `
    <span class="token-chip" style="border-left: 3px solid var(--${t.color || getColor(t.category)})" title="Line ${t.line}">
      ${t.value}
    </span>
  `).join('');
      return `<div class="stream-wrap">${chips}</div>`;
    }

    function getColor(cat) {
      return {
        KEYWORD: 'kw',
        IDENTIFIER: 'id',
        OPERATOR: 'op',
        PUNCTUATOR: 'pun',
        CONSTANT: 'con',
        LITERAL: 'lit',
        UNRECOGNIZED: 'red'
      }[cat] || 'muted';
    }

    function createSection(title, content, fullWidth = false, isWarning = false) {
      const card = document.createElement('div');
      card.className = 'section-card';
      if (fullWidth) card.style.gridColumn = '1 / -1';
      card.innerHTML = `
    <div class="section-header">
      <h2 class="section-title ${isWarning ? 'warning' : ''}">${title}</h2>
      <a href="#" class="refresh-link" onclick="refreshSection(); return false;">↻ Refresh</a>
    </div>
    <div class="section-body">
      ${content}
    </div>
  `;
      return card;
    }

    function createTable(dict, label, colorVar) {
      let rows = '';
      for (const [name, count] of Object.entries(dict.counts)) {
        const linesArr = Array.isArray(dict.tokens?.[name]) ? dict.tokens[name] : [];
        const lines = linesArr.length ? linesArr.join(', ') : '—';
        rows += `
      <tr>
        <td style="color:var(--${colorVar})">${name}</td>
        <td>${count}</td>
        <td style="color:var(--muted); font-size: .7rem;">${lines}</td>
      </tr>
    `;
      }
      return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>${label}</th><th>Qty</th><th>Lines</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
    }

    function createCategoryTable(data) {
      const sumConst = data.constants ? (sum(data.constants.integers?.counts) + sum(data.constants.floats?.counts)) : 0;
      const sumLit = data.literals ? (sum(data.literals.strings?.counts) + sum(data.literals.chars?.counts)) : 0;
      const sumUnrecognized = sum(data.unrecognized?.counts);

      const cats = [
        { name: 'Keywords', val: sum(data.keywords?.counts), col: 'kw' },
        { name: 'Identifiers', val: sum(data.identifiers?.counts), col: 'id' },
        { name: 'Operators', val: sum(data.operators?.counts), col: 'op' },
        { name: 'Separators', val: sum(data.punctuators?.counts), col: 'pun' },
        { name: 'Constants', val: sumConst, col: 'con' },
        { name: 'Literals', val: sumLit, col: 'lit' }
      ];

      // Add unrecognized tokens if present
      if (sumUnrecognized > 0) {
        cats.push({ name: '⚠ Unrecognized', val: sumUnrecognized, col: 'red' });
      }

      let rows = cats.map(c => `
    <tr>
      <td><span class="pill" style="background:var(--${c.col}); color:#000">${c.name}</span></td>
      <td><strong>${c.val}</strong></td>
      <td>${data.total_tokens > 0 ? ((c.val / data.total_tokens) * 100).toFixed(1) : 0}%</td>
    </tr>
  `).join('');

      return `<div class="table-wrap"><table><thead><tr><th>Category</th><th>Count</th><th>%</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function createSnapshot(data) {
      const tokens = getAllTokens(data);
      const totalTokens = data.total_tokens || tokens.length || 0;
      const totalLines = data.total_lines || 0;
      const codeLines = data.lines_with_code || 0;
      const emptyLines = data.empty_lines || 0;

      const uniqueTypes = estimateUniqueTypes(data);
      const avgTokensPerLine = totalLines > 0 ? (totalTokens / totalLines) : 0;

      const { most, least } = mostLeastFrequent(data);
      const busiest = busiestLine(tokens, totalLines);

      return `
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-big">${totalTokens}</div>
        <div class="metric-label">Total Tokens</div>
      </div>
      <div class="metric-card">
        <div class="metric-big">${uniqueTypes}</div>
        <div class="metric-label">Unique Types</div>
      </div>
      <div class="metric-card">
        <div class="metric-big">${codeLines}</div>
        <div class="metric-label">Code Lines</div>
      </div>
      <div class="metric-card">
        <div class="metric-big">${totalLines}</div>
        <div class="metric-label">Total Lines</div>
      </div>
      <div class="metric-card">
        <div class="metric-big">${emptyLines}</div>
        <div class="metric-label">Empty Lines</div>
      </div>
      <div class="metric-card">
        <div class="metric-big">${avgTokensPerLine.toFixed(1)}</div>
        <div class="metric-label">Avg Tokens/Line</div>
      </div>
    </div>
    <div style="height:16px"></div>
    <div class="mono" style="display:grid; gap:12px;">
      <div style="background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:16px;">
        <div style="color:var(--muted); font-size:.75rem; letter-spacing:.08em; text-transform:uppercase;">Most Frequent Token</div>
        <div style="margin-top:8px; font-size:1.05rem;">
          <span style="font-weight:900;">${escapeHtml(most.name || '—')}</span>
          <span style="color:var(--muted);"> · ${most.count || 0} occurrence(s) (${most.percent || '0.00'}%)</span>
        </div>
      </div>
      <div style="background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:16px;">
        <div style="color:var(--muted); font-size:.75rem; letter-spacing:.08em; text-transform:uppercase;">Least Frequent Token</div>
        <div style="margin-top:8px; font-size:1.05rem;">
          <span style="font-weight:900;">${escapeHtml(least.name || '—')}</span>
          <span style="color:var(--muted);"> · ${least.count || 0} occurrence(s) (${least.percent || '0.00'}%)</span>
        </div>
      </div>
      <div style="background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:16px;">
        <div style="color:var(--muted); font-size:.75rem; letter-spacing:.08em; text-transform:uppercase;">Busiest Line</div>
        <div style="margin-top:8px; font-size:1.05rem;">
          <span style="font-weight:900;">Line ${busiest.line || 0}</span>
          <span style="color:var(--muted);"> · ${busiest.count || 0} tokens</span>
        </div>
      </div>
    </div>
  `;
    }

    function createCategoryBars(data) {
      const total = data.total_tokens || 0;
      const sumConst = data.constants ? (sum(data.constants.integers?.counts) + sum(data.constants.floats?.counts)) : 0;
      const sumLit = data.literals ? (sum(data.literals.strings?.counts) + sum(data.literals.chars?.counts)) : 0;
      const sumUnrecognized = sum(data.unrecognized?.counts);

      const rows = [
        { key: 'SEPARATOR', label: 'SEPARATOR', val: sum(data.punctuators?.counts), col: 'pun' },
        { key: 'IDENTIFIER', label: 'IDENTIFIER', val: sum(data.identifiers?.counts), col: 'id' },
        { key: 'OPERATOR', label: 'OPERATOR', val: sum(data.operators?.counts), col: 'op' },
        { key: 'KEYWORD', label: 'KEYWORD', val: sum(data.keywords?.counts), col: 'kw' },
        { key: 'LITERAL', label: 'LITERAL', val: sumLit + sumConst, col: 'lit' }
      ];

      if (sumUnrecognized > 0) rows.push({ key: 'UNRECOGNIZED', label: 'UNRECOGNIZED', val: sumUnrecognized, col: 'red' });

      const safeTotal = total > 0 ? total : rows.reduce((a, r) => a + r.val, 0) || 1;

      return `
    <div class="bar-table">
      ${rows.map(r => {
        const perc = (r.val / safeTotal) * 100;
        return `
          <div class="bar-row">
            <div class="bar-name"><span class="bar-badge" style="background:var(--${r.col}); color:#080b14;">${r.label}</span></div>
            <div class="bar-total">${r.val}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${Math.min(100, perc).toFixed(2)}%; background:var(--${r.col});"></div>
            </div>
            <div class="bar-perc">${perc.toFixed(2)}%</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
    }

    function createLineDistribution(data) {
      const tokens = getAllTokens(data);
      const counts = perLineCounts(tokens);
      const lines = Object.keys(counts).map(n => parseInt(n, 10)).sort((a, b) => a - b);
      if (lines.length === 0) return `<div class="mono" style="color:var(--muted);">No line distribution available.</div>`;

      const max = Math.max(...Object.values(counts));
      const shown = lines.slice(0, 30); // keep it compact like screenshot
      return `
    <div class="line-dist mono">
      <div class="line-row" style="color:var(--muted); font-size:.75rem; text-transform:uppercase; letter-spacing:.08em;">
        <div>Line #</div><div>Tokens</div><div>Distribution</div><div></div>
      </div>
      ${shown.map(ln => {
        const v = counts[ln] || 0;
        const w = max > 0 ? (v / max) * 100 : 0;
        return `
          <div class="line-row">
            <div>Line ${ln}</div>
            <div style="font-weight:900; color:#fff;">${v}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${w.toFixed(2)}%; background: linear-gradient(90deg, var(--green), var(--teal));"></div></div>
            <div style="text-align:right; color:var(--muted);">${v}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
    }

    function getAllTokens(data) {
      if (Array.isArray(data.allTokens) && data.allTokens.length) return data.allTokens;
      return generateFallbackStream(data);
    }

    function perLineCounts(tokens) {
      const out = {};
      (tokens || []).forEach(t => {
        const ln = parseInt(t.line, 10);
        if (!Number.isFinite(ln)) return;
        out[ln] = (out[ln] || 0) + 1;
      });
      return out;
    }

    function busiestLine(tokens, fallbackTotalLines = 0) {
      const counts = perLineCounts(tokens);
      let bestLine = 1;
      let bestCount = 0;
      for (const [k, v] of Object.entries(counts)) {
        const ln = parseInt(k, 10);
        if (v > bestCount) {
          bestCount = v;
          bestLine = ln;
        }
      }
      if (bestCount === 0 && fallbackTotalLines > 0) return { line: 1, count: 0 };
      return { line: bestLine, count: bestCount };
    }

    function estimateUniqueTypes(data) {
      const parts = [];
      const pushCounts = (dict) => dict?.counts ? Object.keys(dict.counts).length : 0;
      parts.push(pushCounts(data.keywords));
      parts.push(pushCounts(data.identifiers));
      parts.push(pushCounts(data.operators));
      parts.push(pushCounts(data.punctuators));
      parts.push(data.constants ? (pushCounts(data.constants.integers) + pushCounts(data.constants.floats)) : 0);
      parts.push(data.literals ? (pushCounts(data.literals.strings) + pushCounts(data.literals.chars)) : 0);
      parts.push(pushCounts(data.unrecognized));
      return parts.reduce((a, b) => a + b, 0);
    }

    function mostLeastFrequent(data) {
      const total = data.total_tokens || 0;
      const items = [];
      const add = (dict, prefix) => {
        if (!dict?.counts) return;
        for (const [name, count] of Object.entries(dict.counts)) {
          items.push({ name: prefix ? `${prefix}${name}` : name, count });
        }
      };

      add(data.keywords, '');
      add(data.identifiers, '');
      add(data.operators, '');
      add(data.punctuators, '');
      if (data.constants) { add(data.constants.integers, ''); add(data.constants.floats, ''); }
      if (data.literals) { add(data.literals.strings, ''); add(data.literals.chars, ''); }
      add(data.unrecognized, '');

      if (items.length === 0) return { most: {}, least: {} };

      items.sort((a, b) => b.count - a.count);
      const most = items[0];

      items.sort((a, b) => a.count - b.count);
      const least = items[0];

      const pct = (c) => total > 0 ? ((c / total) * 100).toFixed(2) : '0.00';
      return {
        most: { name: most.name, count: most.count, percent: pct(most.count) },
        least: { name: least.name, count: least.count, percent: pct(least.count) }
      };
    }

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function createLiteralTable(literals) {
      let rows = '';
      const types = ['strings', 'integers', 'floats', 'chars'];
      types.forEach(type => {
        for (const [val, count] of Object.entries(literals[type].counts)) {
          rows += `<tr><td>${val}</td><td><small>${type.toUpperCase()}</small></td><td>${count}</td></tr>`;
        }
      });
      if (!rows) return null;
      return `<div class="table-wrap"><table><thead><tr><th>Value</th><th>Type</th><th>Qty</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function sum(obj) {
      if (!obj) return 0;
      return Object.values(obj).reduce((a, b) => a + b, 0);
    }
    function sumLiterals(l) {
      if (!l) return 0;
      return sum(l.strings?.counts) + sum(l.integers?.counts) + sum(l.floats?.counts) + sum(l.chars?.counts);
    }

    /* Parser Display Helper Functions */
    function createParserErrorsCard(ast) {
      const errors = ast?.errors || [];
      const warnings = ast?.warnings || [];
      if (errors.length === 0 && warnings.length === 0) {
        return `
      <div style="background: rgba(166, 227, 161, 0.1); border: 1px solid rgba(166, 227, 161, 0.3); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px;">
        <span style="font-size: 1.8rem; color: var(--green);">✓</span>
        <div>
          <h4 style="color: #fff; font-weight: 700; font-size: 1rem; margin-bottom: 4px;">Syntax Analysis Successful</h4>
          <p style="color: var(--muted); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;">The W++ parser successfully built the AST with 0 errors and 0 warnings.</p>
        </div>
      </div>
    `;
      }

      let html = '';
      if (errors.length > 0) {
        html += `
      <div style="background: rgba(243, 139, 168, 0.1); border: 1px solid rgba(243, 139, 168, 0.3); border-radius: 12px; padding: 20px; margin-bottom: 16px;">
        <h4 style="color: var(--red); font-weight: 700; font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <span>❌</span> Syntax Errors Detected (${errors.length})
        </h4>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Line</th><th>Col</th><th>Token</th><th>Error Message</th></tr>
            </thead>
            <tbody>
              ${errors.map(err => `
                <tr>
                  <td style="color: var(--red); font-weight: bold;">${err.line}</td>
                  <td>${err.column || 0}</td>
                  <td style="color: var(--yellow); font-family: 'JetBrains Mono', monospace;">${escapeHtml(err.token || 'EOF')}</td>
                  <td style="color: var(--text);">${escapeHtml(err.message)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
      }

      if (warnings.length > 0) {
        html += `
      <div style="background: rgba(249, 226, 175, 0.1); border: 1px solid rgba(249, 226, 175, 0.3); border-radius: 12px; padding: 20px;">
        <h4 style="color: var(--yellow); font-weight: 700; font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <span>⚠️</span> Syntax Warnings (${warnings.length})
        </h4>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Line</th><th>Message</th></tr>
            </thead>
            <tbody>
              ${warnings.map(warn => `
                <tr>
                  <td style="color: var(--yellow); font-weight: bold;">${warn.line || '—'}</td>
                  <td style="color: var(--text);">${escapeHtml(warn.message)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
      }

      return html;
    }

    function createSymbolTableCard(symbolTable) {
      if (!symbolTable || symbolTable.length === 0) {
        return `
      <div class="mono" style="color:var(--muted); background: rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:16px;">
        Symbol table is empty (no variables or identifiers declared/used).
      </div>
    `;
      }

      let rows = symbolTable.map(entry => {
        let dimLabel = 'Scalar';
        if (entry.dimension === 0) dimLabel = 'Scalar';
        else if (entry.dimension === 1) dimLabel = '1-D Array';
        else if (typeof entry.dimension === 'number') dimLabel = `${entry.dimension}-D Array`;
        else if (entry.dimension && entry.dimension !== '-') dimLabel = entry.dimension;
        else dimLabel = 'Scalar';

        const declLine = entry.line_declared !== null && entry.line_declared !== undefined ? `Line ${entry.line_declared}` : '<span style="color: var(--red);">Undeclared</span>';
        const linesUsed = Array.isArray(entry.lines_used) && entry.lines_used.length > 0 ? entry.lines_used.join(', ') : '—';
        const typeColor = entry.type === 'UNDECLARED' ? 'var(--red)' : 'var(--teal)';
        const sizeVal = entry.size !== undefined ? `${entry.size} B` : '—';

        return `
      <tr>
        <td style="color: var(--accent); font-weight: bold;">${escapeHtml(entry.name)}</td>
        <td><span class="pill" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: ${typeColor};">${escapeHtml(entry.type)}</span></td>
        <td>${sizeVal}</td>
        <td>${dimLabel}</td>
        <td>${declLine}</td>
        <td style="color: var(--muted);">${linesUsed}</td>
      </tr>
    `;
      }).join('');

      return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Identifier</th>
            <th>Type</th>
            <th>Size</th>
            <th>Dimension</th>
            <th>Declared</th>
            <th>Lines Used</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>
  `;
    }

    function createAstCard(ast) {
      const highlighted = syntaxHighlightJSON(ast);
      const containerId = 'ast-code-block-' + Math.floor(Math.random() * 1000000);

      return `
    <div style="position: relative;">
      <button class="ast-copy-btn" onclick="copyAstToClipboard('${containerId}')">Copy AST JSON</button>
      <div id="${containerId}" class="ast-container"><pre><code>${highlighted}</code></pre></div>
    </div>
  `;
    }

    function syntaxHighlightJSON(json) {
      if (typeof json !== 'string') {
        json = JSON.stringify(json, undefined, 2);
      }
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, function (match) {
        let cls = 'number';
        if (/^"/.test(match)) {
          if (/:$/.test(match)) {
            cls = 'key';
          } else {
            cls = 'string';
          }
        } else if (/true|false/.test(match)) {
          cls = 'boolean';
        } else if (/null/.test(match)) {
          cls = 'null';
        }
        return '<span class="json-' + cls + '">' + match + '</span>';
      });
    }

    function copyAstToClipboard(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const text = container.textContent || container.innerText;

      navigator.clipboard.writeText(text).then(() => {
        const btn = container.previousElementSibling;
        if (btn) {
          const originalText = btn.textContent;
          btn.textContent = 'Copied!';
          btn.style.background = 'var(--green)';
          btn.style.color = '#080b14';
          setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = '';
            btn.style.color = '';
          }, 2000);
        }
      }).catch(err => {
        alert('Failed to copy AST: ' + err);
      });
    }
  </script>

</body>
